# 培训分析工具配置 (多数据源版)

# 任务基本信息
task_name: "2026极客行动必知必会学习"

# 文件路径配置
paths:
  # 您下载好的原始 Excel 文件列表
  input_files:
    - "data/data1.xlsx"
    - "data/data2.xlsx"
  # 上一轮的汇总分析文件（可选，用于排名对比）
  previous_analysis: "outputs/combined_analysis.xlsx"
  template_ppt: "reports/templates/template.pptx"
  output_dir: "outputs/"
  data_dir: "data/"

# 数据分析配置
analysis:
  weekly_report_day: "Monday"
  thresholds:
    completion_green: 100.0
    completion_yellow: 80.0
    pass_red: 80.0

# 邮件通知配置
email:
  enabled: true # 是否开启邮件发送功能
  mode: "outlook" # 默认使用本地 Outlook 客户端模式 (无需 SMTP 配置)
  cc_list: "gilbert.ye@dahuatech.com; morgan.hu@dahuatech.com" # 默认抄送人名单
  
  # 邮件内容模板
  subject_template: "{group_name}2026极客必知必会学习进展情况{date}"
  body_template: |
    您好，

    这是 {group_name} 的最新学习进度汇总：
    - 整体完成率：{completion_rate}%
    - 总人数：{total_count}
    - 已完成人数：{completed_count}
    - 未完成人数：{uncompleted_count}

    附件中是该小组对应的未完成人员名单，请协助督促其尽快完成学习。

    祝好！

